services:
  bot:
    build: .
    container_name: telegram-bot
    network_mode: host
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      OLLAMA_URL: http://127.0.0.1:11434/api/chat
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b}
      ALLOWED_CHAT_IDS: ${ALLOWED_CHAT_IDS:-}
    restart: unless-stopped
